version: '3.5'

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    pull_policy: missing
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    pull_policy: missing
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.14
    pull_policy: missing
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      MINIO_REGION: us-east-1
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
  attu:
    container_name: milvus-attu
    profiles: ["obs"]
    image: zilliz/attu:v2.5.11
    pull_policy: missing
    environment:
      - MILVUS_URL=standalone:19530
      - PORT=3000
    ports:
      - "8080:3000"
    depends_on:
      - standalone
    networks:
      - default

  mysql:
    container_name: ragent-mysql
    image: mysql:8.0
    pull_policy: missing
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: agent_chat
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    container_name: ragent-redis
    image: redis:7.2-alpine
    pull_policy: missing
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default

  neo4j:
    container_name: ragent-neo4j
    image: neo4j:5.26-community
    pull_policy: missing
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - default

  # ===== v5.0 可观测性栈 =====
  jaeger:
    container_name: ragent-jaeger
    profiles: ["obs"]
    image: jaegertracing/all-in-one:1.58
    pull_policy: missing
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - default

  prometheus:
    container_name: ragent-prometheus
    profiles: ["obs"]
    image: prom/prometheus:v2.52.0
    pull_policy: missing
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - default

  grafana:
    container_name: ragent-grafana
    profiles: ["obs"]
    image: grafana/grafana:10.4.0
    pull_policy: missing
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - default

  api:
    container_name: ragent-api
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "start.py"]
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      standalone:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - default

  worker:
    container_name: ragent-worker
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uv", "run", "python", "start_worker.py"]
    env_file:
      - .env
    depends_on:
      standalone:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - default

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  neo4j_logs:
  grafana_data:
  mysql_data:
  redis_data:

networks:
  default:
    name: milvus